name: Build and release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: recursive

    - name: Build debug executable
      run: |
        cmake . -G "Visual Studio 17 2022" -A Win32 -DCMAKE_SH="CMAKE_SH-NOTFOUND" -DCMAKE_BUILD_TYPE="Debug"
        cmake --build . -- /p:Configuration=Release
        mv app\Release\maniac.exe maniac-dbg.exe

    - name: Build release executable
      run: |
        Remove-Item -Recurse -Force CMakeCache.txt,CMakeFiles
        cmake . -G "Visual Studio 17 2022" -A Win32 -DCMAKE_SH="CMAKE_SH-NOTFOUND" -DCMAKE_BUILD_TYPE="Release"
        cmake --build . -- /p:Configuration=Release
        mv app\Release\maniac.exe maniac-prd.exe

    - name: Upload debug build
      uses: actions/upload-artifact@v4
      with:
        name: maniac-debug
        path: maniac-dbg.exe

    - name: Upload release build
      uses: actions/upload-artifact@v4
      with:
        name: maniac-release
        path: maniac-prd.exe

  release:
    name: Create release and upload builds
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Download debug build
      uses: actions/download-artifact@v4
      with:
        name: maniac-debug
        path: builds

    - name: Download release build
      uses: actions/download-artifact@v4
      with:
        name: maniac-release
        path: builds

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          builds/maniac-prd.exe
          builds/maniac-dbg.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
